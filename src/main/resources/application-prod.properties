spring.application.name=processing-service
server.port=8081

spring.datasource.username=user
spring.datasource.password=pass
spring.datasource.url=jdbc:postgresql://postgres:5432/payment_db

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

### liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

### Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

logging.file.name=logs/app.log

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

### scheduling
scheduling.enabled=true

### kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.UUIDSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=event-dto:kg.bakaibank.processingservice.kafka.events.OutboxEvent
kafka.topic.payments=payments-topic

### card-limit-service api
limits.service.api=http://165.227.52.16:8080/api/v1